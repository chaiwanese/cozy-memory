    body {

    }

    /* Desktop View Enhancements */
    @media (min-width: 768px) {
        #game { max-width: 500px !important; padding: 30px !important; border-width: 8px !important; }
        #card { min-height: 180px !important; font-size: 24px !important; }
        .word-chip { font-size: 18px !important; padding: 12px !important; }
        button:hover { background-color: #f4a261 !important; transform: translateY(-2px); box-shadow: 0 6px 0 #b04d35 !important; }
    }

    /* Animated Sky Backgrounds */
    .sky-layer { position: fixed; inset: 0; z-index: -2; opacity: 0; transition: opacity 1.5s ease; }
    .active-sky { opacity: 1 !important; }

    /* Main Container - Dark Mode Protection Locked */
    #game { 
        width: 92%; max-width: 380px; 
        background-color: #fdf6e3 !important; 
        border: 6px solid #a47148; border-radius: 20px; 
        padding: 15px 20px 20px; box-shadow: 0 8px 0 #7f5539cc; 
        position: relative; display: flex; flex-direction: column; align-items: center; 
    }
    .tavern-mode #game { background-color: #432818 !important; border-color: #99582a; color: #ffe6a7 !important; }

    /* Juice Animations */
    @keyframes starPop { 50% { transform: scale(1.3); } }
    .star-animate { animation: starPop 0.4s ease; }
    @keyframes shake { 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .shake-animate { animation: shake 0.3s ease 2; }
    @keyframes correctPulse {
        0% { border-color: #cb997e; }
        50% { border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); transform: scale(1.02); }
        100% { border-color: #cb997e; }
    }
    .correct-animate { animation: correctPulse 0.5s ease; }

    #star-display { background: rgba(255, 255, 255, 0.7) !important; padding: 4px 14px; border-radius: 12px; font-size: 18px; font-weight: 700; color: #ffb700 !important; text-shadow: 1px 1px 0 #582f0e; margin-bottom: 8px; border: 2px solid #a47148; }
    #season-icon { position: absolute; bottom: 0; left: 0; transform: translate(-15%, 15%); background: #81b29a; border: 4px solid #a47148; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; z-index: 100; transition: background 0.5s; }
    #timer { position: absolute; top: 0; right: 0; transform: translate(15%, -15%); background: #f2cc8f !important; border: 4px solid #a47148; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: 700; color: #582f0e !important; z-index: 100; }

    .tavern-mode #card { background-color: #6f4e37 !important; border-color: #bb9457; color: #ffffff !important; }
    
    .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
    .word-chip { background-color: #f1faee !important; border: 2px solid #a8dadc; border-radius: 10px; padding: 6px; font-size: 15px; font-weight: 600; text-transform: capitalize; color: #1d3557 !important; }
    
    input { width: 100%; margin-top: 12px; padding: 12px; background-color: #ffffff !important; color: #582f0e !important; border: 3px solid #cb997e; border-radius: 12px; font-family: 'Fredoka', sans-serif; font-size: 18px; text-align: center; outline: none; }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 12px; background: #e76f51 !important; color: #ffffff !important; font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 0 #b04d35; transition: transform 0.1s; }

// --- LOUDER AUDIO SYSTEM ---
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Unlock audio on first touch
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

// Default volume increased from 0.05 to 0.2 (4x louder)
function playSound(freq, type, duration, vol = 0.2, delay = 0) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delay + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay); osc.stop(audioCtx.currentTime + delay + duration);
    } catch(e) {}
}

// Louder button tap
function playTap() { playSound(800, 'sine', 0.08, 0.1); }

// Louder Season Arpeggio
function playSeasonArpeggio() {
    const notes = [523.25, 659.25, 783.99, 1046.50]; 
    notes.forEach((f, i) => playSound(f, 'sine', 0.8, 0.15, i * 0.15));
}

// Louder and sharper "Uh-Oh" buzzer
function playWrongSound() {
    playSound(250, 'sawtooth', 0.15, 0.15, 0); 
    playSound(150, 'sawtooth', 0.3, 0.15, 0.15); 
}

// Attach tap sound to all buttons
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('mousedown', playTap);
    btn.addEventListener('touchstart', playTap, {passive: true});
});

const seasons = [
    {name: "Spring", emoji: "🌸", color: "#81b29a", sky: ["#ff9a9e, #fad0c4, #a1c4fd", "#00BFFF, #87CEFA", "#2c3e50, #4b0082", "#000428, #004e92"]},
    {name: "Summer", emoji: "☀️", color: "#e76f51", sky: ["#ffe259, #ffa751", "#2193b0, #6dd5ed", "#e96443, #904e95", "#0f2027, #2c5364"]},
    {name: "Fall", emoji: "🍂", color: "#a06cd5", sky: ["#f093fb, #f5576c", "#ffafbd, #ffc3a0", "#414345, #232526", "#141e30, #243b55"]},
    {name: "Winter", emoji: "❄️", color: "#457b9d", sky: ["#e6e9f0, #eef1f5", "#83a4d4, #b6fbff", "#2980b9, #2c3e50", "#000000, #434343"]}
];

let totalRounds = 0, seasonCount = 0, hp = 3, score = 0, streak = 0, baseWordCount = 4, baseTimer = 10, bonusTimer = 0;
let roundWords = [], quizWords = [], currentIndex = 0, timeLeft, timerInterval, activeSkyId = 1;

const el = (id) => document.getElementById(id);
const dom = {
    card: el("card"), ans: el("answer"), timer: el("timer"), score: el("top-score"), hp: el("playerHP"),
    day: el("playerDay"), strk: el("streakInfo"), sIcon: el("season-icon"), start: el("startBtn"),
    inst: el("instructBtn"), subm: el("submitBtn"), rest: el("restartBtn"), tavern: el("tavern-container"),
    btns: el("btn-container"), game: el("game"), starBox: el("star-display")
};

const setSky = (isTavern = false) => {
    activeSkyId = activeSkyId === 1 ? 2 : 1;
    const layer = el(`sky-${activeSkyId}`);
    const prev = el(`sky-${activeSkyId === 1 ? 2 : 1}`);
    if (isTavern) layer.style.background = "linear-gradient(to bottom, #432818, #2b170e)";
    else {
        const s = seasons[seasonCount % 4], t = totalRounds % 4;
        layer.style.background = `linear-gradient(to bottom, ${s.sky[t]})`;
    }
    layer.classList.add('active-sky'); prev.classList.remove('active-sky');
};

const updateUI = (starsEarned = 0) => {
    const s = seasons[seasonCount % 4];
    dom.hp.innerText = `❤️ ${hp}`; dom.score.innerText = score;
    if (starsEarned > 0) { dom.starBox.classList.remove('star-animate'); void dom.starBox.offsetWidth; dom.starBox.classList.add('star-animate'); }
    dom.day.innerText = `Day ${(totalRounds % 4) + 1}`; dom.strk.innerText = `🔥 ${streak}`;
    dom.sIcon.innerText = s.emoji; dom.sIcon.style.backgroundColor = s.color;
};

const startRound = () => {
    playSound(1046, 'sine', 0.5, 0.2); // Start round chime
    dom.start.style.display = dom.inst.style.display = dom.rest.style.display = "none";
    dom.subm.style.display = dom.ans.style.display = "block";
    masterPool.sort(() => Math.random() - 0.5);
    roundWords = masterPool.slice(0, baseWordCount);
    quizWords = [...roundWords].sort(() => Math.random() - 0.5);
    currentIndex = 0; setSky(); updateUI();
    dom.ans.disabled = true;
    dom.card.innerHTML = `<div class='word-grid'>${roundWords.map(w => `<div class='word-chip'>${w.word}</div>`).join('')}</div>`;
    timeLeft = baseTimer + bonusTimer; dom.timer.innerText = timeLeft;
    timerInterval = setInterval(() => { timeLeft--; if(timeLeft >= 0) dom.timer.innerText = timeLeft; if(timeLeft < 0) { clearInterval(timerInterval); quizPhase(); } }, 1000);
};

const quizPhase = () => { dom.ans.disabled = false; dom.ans.focus(); dom.timer.innerText = "!"; dom.card.innerHTML = `Which matches?<br><br><i>${quizWords[currentIndex].meaning}</i>`; };

const submit = () => {
    const val = dom.ans.value.trim().toLowerCase();
    if (!val || dom.ans.disabled) return;
    if (val === quizWords[currentIndex].word) {
        streak++; playSound(1318, 'sine', 0.4, 0.2); // Correct Ding
        dom.card.classList.add('correct-animate');
        setTimeout(() => dom.card.classList.remove('correct-animate'), 500);
        if (streak >= 5 && streak % 5 === 0) { 
            score += 10; updateUI(10); 
            playSound(1567, 'sine', 0.8, 0.3); // Loud Streak Sparkle
            dom.card.innerHTML = "<span class='streak-glow'>STREAK! +10 ⭐</span>"; 
        }
        setTimeout(next, 800);
    } else {
        streak = 0; hp--; playWrongSound(); 
        dom.game.classList.add('shake-animate'); setTimeout(() => dom.game.classList.remove('shake-animate'), 600);
        dom.card.innerHTML = `<span style="color:#d00000">Incorrect!</span><br>It was <b>${quizWords[currentIndex].word}</b>`;
        dom.ans.disabled = true;
        setTimeout(() => { if(hp>0){ dom.ans.disabled = false; dom.ans.focus(); next(); } else endGame(); }, 1800);
    }
};

const next = () => {
    dom.ans.value = ""; updateUI();
    if (++currentIndex < quizWords.length) return quizPhase();
    totalRounds++; score += 10; updateUI(10);
    dom.subm.style.display = dom.ans.style.display = "none";
    dom.start.style.display = "block"; dom.start.innerText = "Begin Day";
    if (totalRounds % 4 === 0) openTavern();
    else dom.card.innerHTML = `Day Complete! +10 ⭐<br>Ready for Day ${(totalRounds % 4) + 1}?`;
};

const openTavern = () => {
    playSound(880, 'sine', 1.0, 0.2); setSky(true); document.body.classList.add('tavern-mode');
    dom.btns.style.display = "none"; dom.tavern.style.display = "block";
    dom.timer.innerText = "🍺"; score += 25; updateUI(25);
    dom.card.innerHTML = "<b>The Tavern is Open!</b><br>Season Finish: +25 ⭐";
};

const startNewSeason = () => {
    playSeasonArpeggio(); 
    seasonCount++; baseWordCount += 2; baseTimer += 2;
    document.body.classList.remove('tavern-mode');
    dom.btns.style.display = "block"; dom.tavern.style.display = "none";
    setSky(); updateUI(); dom.card.innerHTML = `${seasons[seasonCount % 4].name} begins!`;
};

const endGame = () => { playWrongSound(); clearInterval(timerInterval); dom.card.innerHTML = "Game Over!"; dom.subm.style.display = "none"; dom.rest.style.display = "block"; };

// --- BUTTON LOGIC ---
dom.start.onclick = startRound; 
dom.subm.onclick = submit; 
dom.ans.onkeypress = (e) => e.key === "Enter" && submit();
dom.inst.onclick = () => { dom.card.innerHTML = "Memorize items, reach streaks of 5 for stars, and spend them at the Tavern every 4 days!"; };

el("buyHeartBtn").onclick = () => { 
    if(score>=100){ playSound(1174, 'sine', 0.4, 0.2); score-=100; hp++; updateUI(); dom.card.innerHTML="Bought Heart! ❤️";} 
    else { playWrongSound(); dom.card.innerHTML="Not enough ⭐!"; }
};
el("buyTimeBtn").onclick = () => { 
    if(score>=50){ playSound(1174, 'sine', 0.4, 0.2); score-=50; bonusTimer+=3; updateUI(); dom.card.innerHTML="Bought +3s Time! ⏳";} 
    else { playWrongSound(); dom.card.innerHTML="Not enough ⭐!"; }
};
el("nextSeasonBtn").onclick = startNewSeason;
dom.rest.onclick = () => location.reload();

// --- KEYBOARD SHORTCUTS ---
window.addEventListener('keydown', (e) => {
    if (e.code === "Space") {
        if (dom.start.style.display !== "none") { playTap(); startRound(); }
        else if (dom.tavern.style.display !== "none") { playTap(); startNewSeason(); }
    }
    if (document.body.classList.contains('tavern-mode')) {
        if (e.key === "1") el("buyHeartBtn").click();
        if (e.key === "2") el("buyTimeBtn").click();
    }
});
