<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cozy Farm: Final Balance</title>

<meta name="theme-color" id="nav-theme" content="#87CEEB">

<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Pixelify Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    color: #582f0e;
    overflow: hidden;
    background-color: #87CEEB; 
}

/* ==========================================
   BACKGROUNDS RESTORED
   ========================================== */

.bg-day { background-image: url('https://i.postimg.cc/gksHTR3t/IMG-20260301-171008.png'); }
.bg-noon { background-image: url('https://i.postimg.cc/x1qMpZfd/IMG-20260301-171031.png'); }
.bg-night { background-image: url('https://i.postimg.cc/k4Nbt3cv/IMG-20260301-171057.png'); }
.bg-midnight { background-image: url('https://i.postimg.cc/fTR9kP09/IMG-20260301-171115.png'); }
.bg-tavern { background: #1a162d !important; background-image: none !important; } 

#bg-image {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -2;
    transition: background 1s ease;
}

/* ==========================================
   GAME UI
   ========================================== */

#game {
    width: 92%; max-width: 400px;
    background: #fdf6e3; border: 6px solid #a47148; 
    border-radius: 15px; padding: 15px 25px 25px 25px;
    box-shadow: 0 8px 0 rgba(127, 85, 57, 0.8); 
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
}

.tavern-mode #game { background: #432818; border-color: #99582a; color: #ffe6a7; }

#star-display {
    background: rgba(255, 255, 255, 0.5);
    padding: 4px 12px;
    border-radius: 15px;
    font-size: 22px;
    font-weight: 700;
    color: #ffb700;
    text-shadow: 1px 1px 0 #582f0e;
    margin-bottom: 8px;
    border: 2px solid #a47148;
}

#season-icon {
    position: absolute; 
    bottom: 0; left: 0; 
    transform: translate(-20%, 20%);
    background: #81b29a;
    border: 4px solid #a47148; 
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 24px;
    z-index: 100;
}

#card {
    width: 100%; background: white; border: 3px solid #cb997e; 
    border-radius: 12px; padding: 20px 15px; min-height: 140px; 
    font-size: 22px; text-align: center; display: flex; 
    flex-direction: column; align-items: center; justify-content: center; line-height: 1.3;
}

.tavern-mode #card { background: #6f4e37; border-color: #bb9457; color: white; }

.word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
.word-chip {
    opacity: 0; background: #f1faee; border: 2px solid #a8dadc;
    border-radius: 8px; padding: 8px; font-size: 16px;
    font-weight: 700; text-transform: capitalize; color: #1d3557;
}

.fly-in { animation: flyIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.fly-out { animation: flyOut 0.3s forwards; }
@keyframes flyIn { to { opacity: 1; transform: translateY(0); } }
@keyframes flyOut { to { opacity: 0; transform: scale(0.8) rotate(5deg); } }

input {
    width: 100%; margin-top: 15px; padding: 12px;
    border: 3px solid #cb997e; border-radius: 10px;
    font-family: 'Pixelify Sans', sans-serif; font-size: 20px; outline: none;
}

button {
    width: 100%; padding: 12px; margin-top: 10px; border: none;
    border-radius: 10px; background: #e76f51; color: white;
    font-family: 'Pixelify Sans', sans-serif; font-size: 20px; cursor: pointer;
    box-shadow: 0 4px 0 #b04d35;
}
button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b04d35; }

#instructBtn { background: #81b29a; box-shadow: 0 4px 0 #5d8a74; }
#buyHeartBtn { background: #d00000; box-shadow: 0 4px 0 #900000; }
#buyTimeBtn { background: #457b9d; box-shadow: 0 4px 0 #1d3557; }
#nextSeasonBtn { background: #f4a261; box-shadow: 0 4px 0 #bc6c25; }

#timer {
    position: absolute; top: 0; right: 0; transform: translate(30%, -30%);
    background: #f2cc8f; border: 4px solid #a47148; 
    width: 60px; height: 60px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 28px; font-weight: 700; color: #582f0e; z-index: 100; 
}

#info {
    width: 100%; display: flex; justify-content: space-between; font-size: 14px;
    margin-top: 20px; border-top: 2px dashed #cb997e; 
    padding: 15px 5px 0 35px; 
}

.pop { animation: pop 0.3s forwards; }
.bounce { animation: bounce 0.4s forwards; }
@keyframes pop { 50% { transform: scale(1.05); } }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.streak-glow { animation: pulse 1s infinite; color: #ffb703; text-shadow: 0 0 10px #fb8500; font-weight: 700; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>
<body>

<div id="bg-image" class="bg-day"></div>

<div id="game">
    <div id="timer">--</div>
    <div id="season-icon">🌸</div>
    <div id="star-display">⭐ <span id="top-score">0</span></div>

    <div id="card">Ready for Day 1?</div>
    
    <input id="answer" placeholder="Type here..." disabled autocomplete="off" style="display:none;">
    
    <div id="btn-container" style="width:100%">
        <button onclick="startRound()" id="startBtn">Begin Day</button>
        <button onclick="showInstructions()" id="instructBtn">How to Play</button>
        <button onclick="submit()" id="submitBtn" style="display:none;">Submit Answer</button>
        <button onclick="resetGame()" id="restartBtn" style="display:none;">Try Again?</button>
    </div>

    <div id="tavern-container" style="width:100%; display:none;">
        <button onclick="buyHeart()" id="buyHeartBtn">❤️ Heart (100 ⭐)</button>
        <button onclick="buyTime()" id="buyTimeBtn">⏳ +3s Timer (50 ⭐)</button>
        <button onclick="startNewSeason()" id="nextSeasonBtn">Start Season</button>
    </div>
    
    <div id="info">
        <span id="playerHP">❤️ 3</span>
        <span id="playerDay">Day 1</span>
        <span id="streakInfo">🔥 0</span>
    </div>
</div>

<script>
let audioCtx;
function playSound(freq, type, duration) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const backgroundClasses = ['bg-day', 'bg-noon', 'bg-night', 'bg-midnight'];
const seasons = [
    {name: "Spring", emoji: "🌸", color: "#81b29a"}, 
    {name: "Summer", emoji: "☀️", color: "#e76f51"}, 
    {name: "Fall", emoji: "🍂", color: "#a06cd5"}, 
    {name: "Winter", emoji: "❄️", color: "#457b9d"}
];
const themeColors = ["#87CEEB", "#e3b18d", "#4c436d", "#1a162d"]; 

const masterPool = [
    {word: "apple", meaning: "A red or green fruit."}, {word: "bucket", meaning: "Used to carry water."},
    {word: "carrot", meaning: "An orange vegetable."}, {word: "quilt", meaning: "A warm patchwork blanket."},
    {word: "hammer", meaning: "A tool used to hit nails."}, {word: "bread", meaning: "Baked food made of flour."},
    {word: "honey", meaning: "Sweet food made by bees."}, {word: "shovel", meaning: "A tool for digging dirt."},
    {word: "flower", meaning: "A colorful plant bloom."}, {word: "cheese", meaning: "Food made from milk."},
    {word: "basket", meaning: "A container woven from straw."}, {word: "lantern", meaning: "A lamp that you can carry."},
    {word: "wheat", meaning: "A grain used to make flour."}, {word: "boots", meaning: "Heavy shoes worn on feet."},
    {word: "acorn", meaning: "A small nut from an oak tree."}, {word: "spoon", meaning: "Used to eat soup."},
    {word: "door", meaning: "Used to enter a room."}, {word: "clock", meaning: "Shows the current time."},
    {word: "brush", meaning: "Used to fix messy hair."}, {word: "bag", meaning: "Used to carry items around."},
    {word: "key", meaning: "Used to unlock a door."}, {word: "coin", meaning: "A small, round piece of money."},
    {word: "ring", meaning: "Jewelry worn on a finger."}, {word: "star", meaning: "A bright shape in the night sky."},
    {word: "sun", meaning: "The hot star that gives us daylight."}, {word: "moon", meaning: "The white rock in the night sky."},
    {word: "cloud", meaning: "White fluffy shape in the sky."}, {word: "rain", meaning: "Water falling from the sky."},
    {word: "snow", meaning: "Cold, white flakes from the sky."}, {word: "wind", meaning: "Moving air that blows outside."},
    {word: "tree", meaning: "A tall plant with a wooden trunk."}, {word: "leaf", meaning: "A flat, green part of a plant."},
    {word: "grass", meaning: "Green plants that cover the ground."}, {word: "rock", meaning: "A hard, solid stone."},
    {word: "sand", meaning: "Tiny grains found at the beach."}, {word: "shell", meaning: "A hard covering found on the beach."},
    {word: "fish", meaning: "An animal that swims in water."}, {word: "bird", meaning: "An animal that flies and has feathers."},
    {word: "cat", meaning: "A small, furry pet that meows."}, {word: "dog", meaning: "A furry pet that barks."},
    {word: "mouse", meaning: "A tiny animal with a long tail."}, {word: "cow", meaning: "A large farm animal that gives milk."},
    {word: "pig", meaning: "A pink farm animal with a curly tail."}, {word: "horse", meaning: "A large animal you can ride."},
    {word: "sheep", meaning: "A farm animal with thick, fluffy wool."}, {word: "goat", meaning: "A farm animal with horns."},
    {word: "duck", meaning: "A bird that quacks and swims."}, {word: "frog", meaning: "A green animal that hops."},
    {word: "bug", meaning: "A tiny insect."}, {word: "bee", meaning: "A buzzing insect that makes honey."},
    {word: "ant", meaning: "A tiny insect that lives in a hill."}, {word: "web", meaning: "A sticky net made by a spider."},
    {word: "book", meaning: "Pages bound together for reading."}, {word: "pen", meaning: "A tool used for writing with ink."},
    {word: "pencil", meaning: "A tool used for writing with lead."}, {word: "paper", meaning: "Thin material used for writing on."},
    {word: "box", meaning: "A container made of cardboard."}, {word: "cup", meaning: "A small container used for drinking."},
    {word: "plate", meaning: "A flat dish used for holding food."}, {word: "bowl", meaning: "A deep round dish used for soup."},
    {word: "fork", meaning: "A tool with prongs used for eating."}, {word: "knife", meaning: "A sharp tool used for cutting."},
    {word: "pot", meaning: "A deep round container for cooking."}, {word: "pan", meaning: "A flat-bottomed container for cooking."},

    {word: "blanket", meaning: "A soft cover that keeps you warm."}, {word: "chair", meaning: "A seat with a back and four legs."},
    {word: "table", meaning: "A piece of furniture with a flat top."}, {word: "lamp", meaning: "A device that gives out light."},

    {word: "dress", meaning: "A single piece of clothing for women."}, {word: "coat", meaning: "A heavy jacket worn outdoors."},
    {word: "scarf", meaning: "A long cloth worn around the neck."}, {word: "glove", meaning: "A covering for the hand."},
    {word: "ball", meaning: "A round object used in games."}, {word: "bat", meaning: "A wooden stick used to hit a ball."},
    {word: "kite", meaning: "A toy that flies in the wind."}, {word: "doll", meaning: "A toy that looks like a person."},
    {word: "car", meaning: "A vehicle with four wheels."}, {word: "bus", meaning: "A large vehicle that carries many people."},
    {word: "train", meaning: "A vehicle that runs on tracks."}, {word: "boat", meaning: "A small vessel for traveling on water."},
    {word: "ship", meaning: "A large vessel for traveling on the ocean."}, {word: "plane", meaning: "A vehicle that flies in the air."},
    {word: "bike", meaning: "A vehicle with two wheels and pedals."}, {word: "bell", meaning: "A hollow object that rings."},
    {word: "drum", meaning: "An instrument you hit with sticks."}, {word: "horn", meaning: "An instrument you blow into."},
    {word: "rake", meaning: "Used to gather fallen leaves."}, {word: "hoe", meaning: "Used to tilt the farm soil."},
    {word: "seeds", meaning: "Plant these to grow crops."}, {word: "barn", meaning: "Where the farm animals live."},
    {word: "coop", meaning: "A house for the chickens."}, {word: "silo", meaning: "Used to store animal feed."},
    {word: "tractor", meaning: "A vehicle used for farming."}, {word: "well", meaning: "A deep hole for getting water."},
    {word: "scythe", meaning: "Used to cut long grass."}, {word: "stable", meaning: "Where the horses are kept."},
    {word: "marrow", meaning: "A large green vegetable."}, {word: "beets", meaning: "Purple root vegetables."},
    {word: "radish", meaning: "A small, spicy red root."}, {word: "garlic", meaning: "A strong-smelling white bulb."},
    {word: "onion", meaning: "A vegetable that makes you cry."}, {word: "kettle", meaning: "Used to boil water for tea."},
    {word: "toaster", meaning: "Used to brown slices of bread."}, {word: "fridge", meaning: "Keeps your food cold and fresh."},
    {word: "stove", meaning: "Used to heat up your meals."}, {word: "apron", meaning: "Worn to keep your clothes clean."},
    {word: "sponge", meaning: "Used to wash the dirty dishes."}, {word: "faucet", meaning: "Where the water comes out."},
    {word: "dresser", meaning: "A chest for keeping your clothes."}, {word: "closet", meaning: "A place to hang your coats."},
    {word: "shelf", meaning: "A flat board for holding books."}, {word: "mirror", meaning: "Shows your reflection."},
    {word: "ladder", meaning: "Used to climb up high."}, {word: "rope", meaning: "Thick cord for tying things."},
    {word: "glue", meaning: "Used to stick things together."}, {word: "brush", meaning: "Used for painting walls."}, {word: "bucket", meaning: "Holds water or sand."}
];

let totalRounds = 0, seasonCount = 0;
let hp = 3, score = 0, streak = 0;
let baseWordCount = 4, baseTimer = 10, bonusTimer = 0;
let roundWords = [], quizWords = [], currentIndex = 0, timeLeft, timerInterval;

const card = document.getElementById("card"), 
      answer = document.getElementById("answer"), 
      startBtn = document.getElementById("startBtn"), 
      instructBtn = document.getElementById("instructBtn"),
      submitBtn = document.getElementById("submitBtn"), 
      restartBtn = document.getElementById("restartBtn"), 
      bgImage = document.getElementById("bg-image"),
      seasonIcon = document.getElementById("season-icon"),
      topScoreDisplay = document.getElementById("top-score"),
      btnContainer = document.getElementById("btn-container"),
      tavernContainer = document.getElementById("tavern-container");

answer.addEventListener("keypress", (e) => { if(e.key === "Enter") submit(); });

function showInstructions() {
    playSound(440, 'sine', 0.1);
    card.innerHTML = "<b>Rules:</b><br>1. Memorize the items.<br>2. Reach streaks of 5 for stars.<br>3. Earn stars for clearing Days (10) and Seasons (25)!";
}

function startRound() {
    playSound(523, 'sine', 0.2); 
    startBtn.style.display = "none"; 
    instructBtn.style.display = "none";
    submitBtn.style.display = "block"; 
    restartBtn.style.display = "none";
    answer.style.display = "block";

    masterPool.sort(() => Math.random() - 0.5);
    roundWords = masterPool.slice(0, baseWordCount);

    let dayIndex = totalRounds % 4;
    bgImage.className = backgroundClasses[dayIndex];
    
    const navTheme = document.getElementById("nav-theme");
    if(navTheme) navTheme.setAttribute("content", themeColors[dayIndex]);
    
    quizWords = [...roundWords].sort(() => Math.random() - 0.5);
    currentIndex = 0; updateUI(); memorizePhase(baseTimer + bonusTimer);
}

function memorizePhase(time) {
    answer.disabled = true; 
    card.innerHTML = "<div class='word-grid' id='wordGrid'></div>";
    
    const grid = document.getElementById("wordGrid");
    roundWords.forEach((w, i) => {
        const div = document.createElement('div'); 
        div.className = 'word-chip'; 
        div.innerText = w.word;
        grid.appendChild(div);
        setTimeout(() => { 
            div.classList.add('fly-in'); 
            playSound(650 + (i * 20), 'sine', 0.1); 
        }, i * 120);
    });

    timeLeft = time; 
    document.getElementById("timer").innerText = timeLeft;
    timerInterval = setInterval(() => {
        timeLeft--; 
        if(timeLeft >= 0) document.getElementById("timer").innerText = timeLeft;
        if(timeLeft === 1) document.querySelectorAll('.word-chip').forEach((c, i) => setTimeout(() => c.classList.replace('fly-in', 'fly-out'), i * 60));
        if(timeLeft <= 0) { clearInterval(timerInterval); quizPhase(); }
    }, 1000);
}

function quizPhase() {
    answer.disabled = false; 
    answer.focus(); 
    document.getElementById("timer").innerText = "!";
    card.innerHTML = "Which word matches?<br><br><i>" + quizWords[currentIndex].meaning + "</i>";
}

function submit() {
    if(answer.disabled) return;
    const correctWord = quizWords[currentIndex].word;
    const playerInput = answer.value.trim().toLowerCase();

    if(playerInput === correctWord) {
        streak++;
        // STREAK LOGIC: Every 5 gives 10 stars
        if(streak >= 5 && streak % 5 === 0) {
            score += 10; 
            playSound(1200, 'sine', 0.3);
            card.innerHTML = "<span class='streak-glow'>STREAK REWARD! +10 Stars</span>";
        } else {
            playSound(880, 'sine', 0.2); 
            card.classList.add("pop");
        }
        setTimeout(nextQuestion, 800);
    } else {
        streak = 0; hp--; 
        playSound(350, 'triangle', 0.3); 
        card.classList.add("bounce");
        answer.disabled = true;
        card.innerHTML = `<span style="color:#d00000">Incorrect!</span><br>The correct word was <b>${correctWord}</b>.`;
        setTimeout(() => { 
            answer.disabled = false; 
            answer.focus(); 
            nextQuestion(); 
        }, 1800);
    }
}

function nextQuestion() {
    card.classList.remove("pop", "bounce");
    answer.value = ""; 
    updateUI();
    if(hp <= 0) return endGame("Season failed... Game Over.");
    
    currentIndex++;
    if(currentIndex >= quizWords.length) { 
        totalRounds++;
        
        // REWARD: 10 Stars for Day
        score += 10;
        updateUI();
        
        if (totalRounds % 4 === 0) return openTavern();
        
        showStartUI("Day Complete! +10 ⭐<br>Ready for Day " + ((totalRounds % 4) + 1) + "?");
    } else {
        card.innerHTML = "Which word matches?<br><br><i>" + quizWords[currentIndex].meaning + "</i>";
    }
}

function openTavern() {
    bgImage.className = 'bg-tavern';
    document.body.classList.add('tavern-mode');
    btnContainer.style.display = "none";
    tavernContainer.style.display = "block";
    answer.style.display = "none";
    document.getElementById("timer").innerText = "🍺";
    card.innerHTML = "<b>Welcome to the Tavern!</b><br>Season Finish Bonus: +25 ⭐<br>Get ready for the next Season.";
    
    // REWARD: 25 Stars for Season
    score += 25;
    updateUI();
}

function buyHeart() {
    if (score >= 100) {
        score -= 100; hp++; 
        playSound(600, 'sine', 0.2); 
        updateUI();
        card.innerHTML = "Bought a Heart! ❤️";
    } else { card.innerHTML = "You need 100 ⭐."; }
}

function buyTime() {
    if (score >= 50) {
        score -= 50; bonusTimer += 3; // +3s Timer
        playSound(600, 'sine', 0.2); 
        updateUI();
        card.innerHTML = "Bought +3s Timer! ⏳ (" + (baseTimer + bonusTimer) + "s total)";
    } else { card.innerHTML = "You need 50 ⭐."; }
}

function startNewSeason() {
    seasonCount++;
    baseWordCount += 2; 
    baseTimer += 3;     
    document.body.classList.remove('tavern-mode');
    tavernContainer.style.display = "none";
    btnContainer.style.display = "block";
    bgImage.className = 'bg-day';
    
    const curSeason = seasons[seasonCount % 4];
    updateUI();
    showStartUI(curSeason.name + " begins!<br>Ready for Day 1?");
}

function showStartUI(message) {
    submitBtn.style.display = "none";
    startBtn.style.display = "block";
    startBtn.innerText = "Begin Day";
    answer.style.display = "none";
    card.innerHTML = message;
}

function updateUI() {
    const curSeason = seasons[seasonCount % 4];
    document.getElementById("playerHP").innerHTML = `❤️ ${hp}`;
    topScoreDisplay.innerHTML = score;
    document.getElementById("playerDay").innerHTML = `Day ${(totalRounds % 4) + 1}`;
    document.getElementById("streakInfo").innerHTML = `🔥 ${streak}`;
    
    seasonIcon.innerHTML = curSeason.emoji;
    seasonIcon.style.backgroundColor = curSeason.color;
}

function endGame(msg) {
    clearInterval(timerInterval); 
    card.innerHTML = msg; 
    answer.disabled = true; 
    submitBtn.style.display = "none";
    restartBtn.style.display = "block"; 
}

function resetGame() {
    totalRounds = 0; seasonCount = 0; hp = 3; score = 0; streak = 0;
    baseWordCount = 4; baseTimer = 10; bonusTimer = 0;
    bgImage.className = 'bg-day'; 
    document.body.classList.remove('tavern-mode');
    tavernContainer.style.display = "none";
    btnContainer.style.display = "block";
    updateUI(); 
    showStartUI("A fresh morning!<br>Ready for Day 1?");
    instructBtn.style.display = "block";
    restartBtn.style.display = "none";
}
</script>
</body>
</html>
