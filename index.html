<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cozy Farm Memory</title>
<meta name="theme-color" id="nav-theme" content="#87CEEB">

<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Pixelify Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    color: #582f0e;
    overflow: hidden;
    background-color: #87CEEB; /* Blue fallback while images load */
}

/* ==========================================
   LAYERED BACKGROUND SYSTEM (STABLE)
   ========================================== */
.bg-layer {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -2;
    opacity: 0; /* Hidden by default */
    transition: opacity 1s ease-in-out;
}

/* Specific Layer Images */
#layer-day { background-image: url('https://i.postimg.cc/gksHTR3t/IMG-20260301-171008.png'); }
#layer-noon { background-image: url('https://i.postimg.cc/x1qMpZfd/IMG-20260301-171031.png'); }
#layer-night { background-image: url('https://i.postimg.cc/k4Nbt3cv/IMG-20260301-171057.png'); }
#layer-midnight { background-image: url('https://i.postimg.cc/fTR9kP09/IMG-20260301-171115.png'); }
#layer-tavern { background: #1a162d; }

.bg-visible { opacity: 1 !important; }

/* ==========================================
   GAME UI
   ========================================== */
#game {
    width: 92%; max-width: 400px;
    background: #fdf6e3; border: 6px solid #a47148; 
    border-radius: 15px; padding: 15px 25px 25px 25px;
    box-shadow: 0 8px 0 rgba(127, 85, 57, 0.8); 
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
}

.tavern-mode #game { background: #432818; border-color: #99582a; color: #ffe6a7; }

#star-display {
    background: rgba(255, 255, 255, 0.6);
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    color: #ffb700;
    text-shadow: 1px 1px 0 #582f0e;
    margin-bottom: 8px;
    border: 2px solid #a47148;
}

#season-icon {
    position: absolute; 
    bottom: 0; left: 0; 
    transform: translate(-15%, 15%);
    background: #81b29a;
    border: 4px solid #a47148; 
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 24px;
    z-index: 100;
}

#card {
    width: 100%; background: white; border: 3px solid #cb997e; 
    border-radius: 12px; padding: 15px; min-height: 140px; 
    font-size: 20px; text-align: center; display: flex; 
    flex-direction: column; align-items: center; justify-content: center; line-height: 1.3;
}

.tavern-mode #card { background: #6f4e37; border-color: #bb9457; color: white; }

.word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
.word-chip {
    background: #f1faee; border: 2px solid #a8dadc;
    border-radius: 8px; padding: 6px; font-size: 15px;
    font-weight: 700; text-transform: capitalize; color: #1d3557;
}

input {
    width: 100%; margin-top: 15px; padding: 12px;
    border: 3px solid #cb997e; border-radius: 10px;
    font-family: 'Pixelify Sans', sans-serif; font-size: 20px; outline: none;
}

button {
    width: 100%; padding: 12px; margin-top: 10px; border: none;
    border-radius: 10px; background: #e76f51; color: white;
    font-family: 'Pixelify Sans', sans-serif; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 0 #b04d35;
}
button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b04d35; }

#instructBtn { background: #81b29a; box-shadow: 0 4px 0 #5d8a74; }
#buyHeartBtn { background: #d00000; box-shadow: 0 4px 0 #900000; }
#buyTimeBtn { background: #457b9d; box-shadow: 0 4px 0 #1d3557; }

#timer {
    position: absolute; top: 0; right: 0; transform: translate(15%, -15%);
    background: #f2cc8f; border: 4px solid #a47148; 
    width: 55px; height: 55px; border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 24px; font-weight: 700; color: #582f0e; z-index: 100; 
}

#info {
    width: 100%; display: flex; justify-content: space-between; font-size: 14px;
    margin-top: 20px; border-top: 2px dashed #cb997e; 
    padding: 15px 0 0 35px;
}

.streak-glow { animation: pulse 1s infinite; color: #ffb703; text-shadow: 0 0 10px #fb8500; font-weight: 700; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>
<body>

<div id="layer-day" class="bg-layer bg-visible"></div>
<div id="layer-noon" class="bg-layer"></div>
<div id="layer-night" class="bg-layer"></div>
<div id="layer-midnight" class="bg-layer"></div>
<div id="layer-tavern" class="bg-layer"></div>

<div id="game">
    <div id="timer">--</div>
    <div id="season-icon">🌸</div>
    <div id="star-display">⭐ <span id="top-score">0</span></div>

    <div id="card">A fresh morning!<br>Ready for Day 1?</div>
    
    <input id="answer" placeholder="Type here..." disabled autocomplete="off" style="display:none;">
    
    <div id="btn-container" style="width:100%">
        <button onclick="startRound()" id="startBtn">Begin Day</button>
        <button onclick="showInstructions()" id="instructBtn">How to Play</button>
        <button onclick="submit()" id="submitBtn" style="display:none;">Submit Answer</button>
        <button onclick="resetGame()" id="restartBtn" style="display:none;">Try Again?</button>
    </div>

    <div id="tavern-container" style="width:100%; display:none;">
        <button onclick="buyHeart()" id="buyHeartBtn">❤️ Heart (100 ⭐)</button>
        <button onclick="buyTime()" id="buyTimeBtn">⏳ +3s Timer (50 ⭐)</button>
        <button onclick="startNewSeason()" id="nextSeasonBtn">Start Season</button>
    </div>
    
    <div id="info">
        <span id="playerHP">❤️ 3</span>
        <span id="playerDay">Day 1</span>
        <span id="streakInfo">🔥 0</span>
    </div>
</div>

<script>
let audioCtx;
function playSound(freq, type, duration) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const seasons = [
    {name: "Spring", emoji: "🌸", color: "#81b29a"}, 
    {name: "Summer", emoji: "☀️", color: "#e76f51"}, 
    {name: "Fall", emoji: "🍂", color: "#a06cd5"}, 
    {name: "Winter", emoji: "❄️", color: "#457b9d"}
];

const masterPool = [
    {word: "apple", meaning: "A red or green fruit."}, {word: "bucket", meaning: "Used to carry water."},
    {word: "carrot", meaning: "An orange vegetable."}, {word: "quilt", meaning: "A warm patchwork blanket."},
    {word: "hammer", meaning: "A tool used to hit nails."}, {word: "bread", meaning: "Baked food made of flour."},
    {word: "honey", meaning: "Sweet food made by bees."}, {word: "shovel", meaning: "A tool for digging dirt."},
    {word: "flower", meaning: "A colorful plant bloom."}, {word: "cheese", meaning: "Food made from milk."},
    {word: "basket", meaning: "A woven container."}, {word: "lantern", meaning: "A lamp you carry."},
    {word: "wheat", meaning: "Grain for making flour."}, {word: "boots", meaning: "Heavy outdoor shoes."},
    {word: "acorn", meaning: "Small nut from an oak tree."}, {word: "spoon", meaning: "Used to eat soup."},
    {word: "door", meaning: "Used to enter a room."}, {word: "clock", meaning: "Shows the current time."},
    {word: "brush", meaning: "Used for messy hair."}, {word: "bag", meaning: "Used to carry items."},
    {word: "key", meaning: "Used to unlock a door."}, {word: "coin", meaning: "Small piece of money."},
    {word: "ring", meaning: "Jewelry for a finger."}, {word: "star", meaning: "Bright light in the sky."},
    {word: "sun", meaning: "Hot star in daytime."}, {word: "moon", meaning: "White rock in night sky."},
    {word: "cloud", meaning: "Fluffy white shape in sky."}, {word: "rain", meaning: "Water falling from sky."},
    {word: "snow", meaning: "Cold white flakes."}, {word: "wind", meaning: "Moving outdoor air."},
    {word: "tree", meaning: "Tall plant with wooden trunk."}, {word: "leaf", meaning: "Flat green plant part."},
    {word: "grass", meaning: "Green plants on ground."}, {word: "rock", meaning: "Hard, solid stone."},
    {word: "sand", meaning: "Tiny grains at the beach."}, {word: "shell", meaning: "Hard beach covering."},
    {word: "fish", meaning: "Animal that swims."}, {word: "bird", meaning: "Animal that flies."},
    {word: "cat", meaning: "Small pet that meows."}, {word: "dog", meaning: "Furry pet that barks."},
    {word: "mouse", meaning: "Tiny animal with long tail."}, {word: "cow", meaning: "Farm animal for milk."},
    {word: "pig", meaning: "Pink animal, curly tail."}, {word: "horse", meaning: "Large animal you ride."},
    {word: "sheep", meaning: "Animal with fluffy wool."}, {word: "goat", meaning: "Farm animal with horns."},
    {word: "duck", meaning: "Bird that quacks."}, {word: "frog", meaning: "Green animal that hops."},
    {word: "bee", meaning: "Buzzer that makes honey."}, {word: "ant", meaning: "Tiny insect in a hill."},
    {word: "book", meaning: "Pages for reading."}, {word: "pen", meaning: "Writes with ink."},
    {word: "box", meaning: "Cardboard container."}, {word: "cup", meaning: "For drinking liquids."},
    {word: "plate", meaning: "Flat dish for food."}, {word: "bowl", meaning: "Deep dish for soup."},
    {word: "fork", meaning: "Tool with sharp prongs."}, {word: "knife", meaning: "Sharp tool for cutting."},
    {word: "pot", meaning: "Deep round cooker."}, {word: "pan", meaning: "Flat round cooker."},
    {word: "bed", meaning: "Furniture for sleeping."}, {word: "pillow", meaning: "Cushion for your head."},
    {word: "chair", meaning: "Seat with four legs."}, {word: "table", meaning: "Furniture with flat top."},
    {word: "lamp", meaning: "Device that gives light."}, {word: "wall", meaning: "Solid side of a room."},
    {word: "roof", meaning: "Top covering of house."}, {word: "window", meaning: "Glass wall opening."},
    {word: "shoe", meaning: "Covering for the foot."}, {word: "hat", meaning: "Covering for the head."},
    {word: "shirt", meaning: "Clothing for upper body."}, {word: "pants", meaning: "Clothing for legs."},
    {word: "dress", meaning: "Single piece for women."}, {word: "coat", meaning: "Heavy outdoor jacket."},
    {word: "ball", meaning: "Round object for games."}, {word: "kite", meaning: "Flying wind toy."},
    {word: "car", meaning: "Four-wheeled vehicle."}, {word: "bike", meaning: "Two-wheeled pedal vehicle."},
    {word: "drum", meaning: "Hit it with sticks."}, {word: "rake", meaning: "Gathers fallen leaves."},
    {word: "hoe", meaning: "Tilts farm soil."}, {word: "seeds", meaning: "Plant these to grow crops."},
    {word: "barn", meaning: "Where farm animals live."},
    {word: "coop", meaning: "House for chickens."}, {word: "silo", meaning: "Stores animal feed."},
    {word: "well", meaning: "Hole for getting water."}, {word: "beets", meaning: "Purple root vegetable."},
    {word: "onion", meaning: "Veggie makes you cry."}, {word: "kettle", meaning: "Boils water for tea."},
    {word: "fridge", meaning: "Keeps food cold."}, {word: "stove", meaning: "Heats up meals."},
    {word: "sponge", meaning: "Washes dirty dishes."}, {word: "faucet", meaning: "Where water comes out."},
    {word: "closet", meaning: "Place to hang coats."}, {word: "shelf", meaning: "Flat board for books."},
    {word: "ladder", meaning: "Used to climb high."}, {word: "rope", meaning: "Thick tying cord."},
    {word: "brush", meaning: "Used for painting."}, {word: "bucket", meaning: "Holds water or sand."}
];

let totalRounds = 0, seasonCount = 0;
let hp = 3, score = 0, streak = 0;
let baseWordCount = 4, baseTimer = 10, bonusTimer = 0;
let roundWords = [], quizWords = [], currentIndex = 0, timeLeft, timerInterval;

const card = document.getElementById("card"), 
      answer = document.getElementById("answer"), 
      startBtn = document.getElementById("startBtn"), 
      instructBtn = document.getElementById("instructBtn"),
      submitBtn = document.getElementById("submitBtn"), 
      restartBtn = document.getElementById("restartBtn"), 
      seasonIcon = document.getElementById("season-icon"),
      topScoreDisplay = document.getElementById("top-score"),
      btnContainer = document.getElementById("btn-container"),
      tavernContainer = document.getElementById("tavern-container");

answer.addEventListener("keypress", (e) => { if(e.key === "Enter") submit(); });

function switchBG(id) {
    document.querySelectorAll('.bg-layer').forEach(l => l.classList.remove('bg-visible'));
    document.getElementById(id).classList.add('bg-visible');
}

function showInstructions() {
    playSound(440, 'sine', 0.1);
    card.innerHTML = "<b>Rules:</b><br>1. Memorize items.<br>2. Streaks of 5 earn ⭐ 10 stars.<br>3. Earn stars for clearing Days (10) and Seasons (25)!";
}

function startRound() {
    playSound(523, 'sine', 0.2); 
    startBtn.style.display = "none"; instructBtn.style.display = "none";
    submitBtn.style.display = "block"; restartBtn.style.display = "none";
    answer.style.display = "block";

    masterPool.sort(() => Math.random() - 0.5);
    roundWords = masterPool.slice(0, baseWordCount);

    const bgIDs = ['layer-day', 'layer-noon', 'layer-night', 'layer-midnight'];
    switchBG(bgIDs[totalRounds % 4]);
    
    quizWords = [...roundWords].sort(() => Math.random() - 0.5);
    currentIndex = 0; updateUI(); memorizePhase(baseTimer + bonusTimer);
}

function memorizePhase(time) {
    answer.disabled = true; 
    card.innerHTML = "<div class='word-grid' id='wordGrid'></div>";
    const grid = document.getElementById("wordGrid");
    roundWords.forEach((w, i) => {
        const div = document.createElement('div'); 
        div.className = 'word-chip'; div.innerText = w.word;
        grid.appendChild(div);
    });

    timeLeft = time; 
    document.getElementById("timer").innerText = timeLeft;
    timerInterval = setInterval(() => {
        timeLeft--; 
        if(timeLeft >= 0) document.getElementById("timer").innerText = timeLeft;
        if(timeLeft <= 0) { clearInterval(timerInterval); quizPhase(); }
    }, 1000);
}

function quizPhase() {
    answer.disabled = false; answer.focus(); document.getElementById("timer").innerText = "!";
    card.innerHTML = "Which word matches?<br><br><i>" + quizWords[currentIndex].meaning + "</i>";
}

function submit() {
    if(answer.disabled) return;
    const correctWord = quizWords[currentIndex].word;
    const playerInput = answer.value.trim().toLowerCase();

    if(playerInput === correctWord) {
        streak++;
        if(streak >= 5 && streak % 5 === 0) {
            score += 10; playSound(1200, 'sine', 0.3);
            card.innerHTML = "<span class='streak-glow'>STREAK REWARD! +10 Stars</span>";
        } else {
            playSound(880, 'sine', 0.2); card.classList.add("pop");
        }
        setTimeout(nextQuestion, 800);
    } else {
        streak = 0; hp--; playSound(350, 'triangle', 0.3); card.classList.add("bounce");
        answer.disabled = true;
        card.innerHTML = `<span style="color:#d00000">Incorrect!</span><br>The correct word was <b>${correctWord}</b>.`;
        setTimeout(() => { answer.disabled = false; answer.focus(); nextQuestion(); }, 1800);
    }
}

function nextQuestion() {
    card.classList.remove("pop", "bounce");
    answer.value = ""; updateUI();
    if(hp <= 0) return endGame("Too tired to farm... Game Over.");
    
    currentIndex++;
    if(currentIndex >= quizWords.length) { 
        totalRounds++;
        score += 10; updateUI();
        if (totalRounds % 4 === 0) return openTavern();
        showStartUI("Day Complete! +10 ⭐<br>Ready for Day " + ((totalRounds % 4) + 1) + "?");
    } else {
        card.innerHTML = "Which word matches?<br><br><i>" + quizWords[currentIndex].meaning + "</i>";
    }
}

function openTavern() {
    switchBG('layer-tavern');
    document.body.classList.add('tavern-mode');
    btnContainer.style.display = "none";
    tavernContainer.style.display = "block";
    answer.style.display = "none";
    document.getElementById("timer").innerText = "🍺";
    card.innerHTML = "<b>Welcome to the Tavern!</b><br>Season Clear: +25 ⭐<br>Prepare for the next Season.";
    score += 25; updateUI();
}

function buyHeart() {
    if (score >= 100) {
        score -= 100; hp++; playSound(600, 'sine', 0.2); updateUI();
        card.innerHTML = "Bought a Heart! ❤️";
    } else { card.innerHTML = "You need 100 ⭐."; }
}

function buyTime() {
    if (score >= 50) {
        score -= 50; bonusTimer += 3; playSound(600, 'sine', 0.2); updateUI();
        card.innerHTML = "Bought +3s Timer! ⏳ (" + (baseTimer + bonusTimer) + "s total)";
    } else { card.innerHTML = "You need 50 ⭐."; }
}

function startNewSeason() {
    seasonCount++; baseWordCount += 2; baseTimer += 3;     
    document.body.classList.remove('tavern-mode');
    tavernContainer.style.display = "none"; btnContainer.style.display = "block";
    switchBG('layer-day');
    updateUI();
    showStartUI(seasons[seasonCount % 4].name + " begins!<br>New words await.");
}

function showStartUI(message) {
    submitBtn.style.display = "none"; startBtn.style.display = "block";
    startBtn.innerText = "Begin Day"; answer.style.display = "none";
    card.innerHTML = message;
}

function updateUI() {
    const curSeason = seasons[seasonCount % 4];
    document.getElementById("playerHP").innerHTML = `❤️ ${hp}`;
    topScoreDisplay.innerHTML = score;
    document.getElementById("playerDay").innerHTML = `Day ${(totalRounds % 4) + 1}`;
    document.getElementById("streakInfo").innerHTML = `🔥 ${streak}`;
    seasonIcon.innerHTML = curSeason.emoji;
    seasonIcon.style.backgroundColor = curSeason.color;
}

function endGame(msg) {
    clearInterval(timerInterval); card.innerHTML = msg; 
    answer.disabled = true; submitBtn.style.display = "none";
    restartBtn.style.display = "block"; 
}

function resetGame() {
    totalRounds = 0; seasonCount = 0; hp = 3; score = 0; streak = 0;
    baseWordCount = 4; baseTimer = 10; bonusTimer = 0;
    switchBG('layer-day'); document.body.classList.remove('tavern-mode');
    tavernContainer.style.display = "none"; btnContainer.style.display = "block";
    updateUI(); showStartUI("Ready for Day 1?");
    restartBtn.style.display = "none";
}
</script>
</body>
</html>
