<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cozy Farm Memory</title>
<meta name="color-scheme" content="light">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
        margin: 0; font-family: 'Fredoka', sans-serif; 
        display: flex; justify-content: center; align-items: center; 
        height: 100vh; width: 100vw; color: #582f0e !important; 
        overflow: hidden; background: #81b29a; 
    }
    
    @media (min-width: 768px) { 
        #game { max-width: 500px!important; padding: 30px!important; } 
        #card { min-height: 180px!important; font-size: 24px!important; } 
    }

    .sky { position: fixed; inset: 0; z-index: -2; opacity: 0; transition: 1.5s; pointer-events: none; }
    .active { opacity: 1; }

    #game { 
        width: 92%; max-width: 380px; background: #fdf6e3!important; 
        border: 6px solid #a47148; border-radius: 20px; padding: 15px; 
        box-shadow: 0 8px 0 #7f5539cc; position: relative; display: flex; 
        flex-direction: column; align-items: center; z-index: 10;
    }
    .tavern-mode #game { background: #432818!important; border-color: #99582a; color: #ffe6a7!important; }
    
    #card { width: 100%; background: #fff!important; color: #582f0e!important; border: 3px solid #cb997e; border-radius: 15px; padding: 15px 20px; min-height: 130px; font-size: 21px; text-align: center; display: flex; flex-direction: column; justify-content: center; z-index: 20; overflow-y: auto; }
    
    #timer { position: absolute; top: 0; right: 0; transform: translate(15%, -15%); background: #f2cc8f!important; border: 4px solid #a47148; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: 700; z-index: 100; }
    
    #season-box { position: absolute; bottom: 0; left: 0; transform: translate(-15%, 15%); width: 52px; height: 52px; border-radius: 50%; border: 4px solid #a47148; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: 0.5s; z-index: 110; background: #81b29a; }
    
    #star-display { background: rgba(255,255,255,0.7)!important; padding: 4px 14px; border-radius: 12px; font-weight: 700; color: #ffb700!important; margin-bottom: 8px; border: 2px solid #a47148; }

    input { width: 100%; margin-top: 12px; padding: 12px; border: 3px solid #cb997e; border-radius: 12px; font-family: inherit; font-size: 18px; text-align: center; outline: none; display: none; }
    
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 12px; background: #e76f51!important; color: #fff!important; font: inherit; font-weight: 600; cursor: pointer; box-shadow: 0 4px 0 #b04d35; transition: 0.1s; }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b04d35; }
    
    #instructBtn { background: #81b29a!important; box-shadow: 0 4px 0 #5d8a74; }
    #resetSaveBtn { background: #d00000!important; box-shadow: 0 4px 0 #900000; display: none; }
    
    .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .word-chip { background: #f1faee!important; border: 2px solid #a8dadc; border-radius: 10px; padding: 6px; font-size: 15px; font-weight: 600; color: #1d3557!important; }
    
    #info { width: 100%; display: flex; justify-content: space-between; font-size: 15px; margin-top: 15px; border-top: 2px dashed #cb997e; padding: 12px 0 0 38px; font-weight: 700; }

    @keyframes pulse { 50% { transform: scale(1.1); } }
    .correct { animation: pulse 0.5s ease; border-color: #2ecc71!important; }
    .danger { color: #d00000!important; animation: pulse 0.5s infinite; }
</style>
</head>

    const seasons = [
        {e: "🌸", c: "#81b29a", s: ["#ff9a9e, #fad0c4, #a1c4fd", "#00BFFF, #87CEFA", "#2c3e50, #4b0082", "#000428, #004e92"]},
        {e: "☀️", c: "#e76f51", s: ["#ffe259, #ffa751", "#2193b0, #6dd5ed", "#e96443, #904e95", "#0f2027, #2c5364"]},
        {e: "🍂", c: "#a06cd5", s: ["#f093fb, #f5576c", "#ffafbd, #ffc3a0", "#414345, #232526", "#141e30, #243b55"]},
        {e: "❄️", c: "#457b9d", s: ["#e6e9f0, #eef1f5", "#83a4d4, #b6fbff", "#2980b9, #2c3e50", "#000000, #434343"]}
    ];

    let st = { hp:3, sc:0, rounds:0, sea:0, bTime:0, wCount:4, tBase:10, streak:0 };
    let cW = [], qW = [], idx = 0, timer, time;

    const $ = id => document.getElementById(id);
    
    const updUI = () => {
        const s = seasons[st.sea % 4];
        $('hp').innerText = `❤️ ${st.hp}`;
        $('score').innerText = st.sc;
        $('day').innerText = `Day ${(st.rounds % 4) + 1}`;
        let m = st.streak >= 15 ? " (x3)" : st.streak >= 10 ? " (x2)" : "";
        $('strk').innerText = `🔥 ${st.streak}${m}`;
        $('season-box').innerText = s.e;
        $('season-box').style.background = s.c;
        document.body.style.background = s.c;
    };

    const save = () => localStorage.setItem('farmSave', JSON.stringify(st));
    
    const sky = (tavern=false) => {
        const l1 = $('sky-1'), l2 = $('sky-2');
        const active = l1.classList.contains('active') ? l2 : l1;
        const prev = active === l1 ? l2 : l1;
        active.style.background = tavern ? "linear-gradient(#432818, #2b170e)" : `linear-gradient(${seasons[st.sea%4].s[st.rounds%4]})`;
        active.classList.add('active'); prev.classList.remove('active');
    };

    const start = () => {
        sfx(1046, 'sine', 0.5);
        $('startBtn').style.display = $('instructBtn').style.display = $('resetSaveBtn').style.display = 'none';
        $('ans').style.display = 'none'; $('subBtn').style.display = 'block';
        cW = pool.sort(() => .5 - Math.random()).slice(0, st.wCount);
        qW = [...cW].sort(() => .5 - Math.random());
        idx = 0; sky(); updUI();
        $('card').innerHTML = `<div class='word-grid'>${cW.map(w => `<div class='word-chip'>${w.word}</div>`).join('')}</div>`;
        time = st.tBase + st.bTime; $('timer').innerText = time;
        timer = setInterval(() => {
            time--; $('timer').innerText = time;
            if(time <= 3 && time > 0) { $('timer').classList.add('danger'); playTick(); }
            if(time < 0) { clearInterval(timer); quiz(); }
        }, 1000);
    };

    const quiz = () => {
        $('ans').style.display = 'block'; $('ans').disabled = false; $('ans').value = "";
        $('timer').innerText = "!"; $('timer').classList.remove('danger');
        $('card').innerHTML = `Which matches?<br><br><i>${qW[idx].meaning}</i>`;
        $('ans').focus();
    };

    const submit = () => {
        const v = $('ans').value.trim().toLowerCase();
        if(!v || $('ans').disabled) return;
        if(v === qW[idx].word) {
            st.streak++; sfx(1318, 'sine', 0.4); $('card').classList.add('correct');
            setTimeout(() => $('card').classList.remove('correct'), 500);
            if(st.streak >= 5 && st.streak % 5 === 0) {
                let m = st.streak >= 15 ? 3 : st.streak >= 10 ? 2 : 1;
                st.sc += (10 * m); updUI();
                $('card').innerHTML = `<span style="font-size:24px;">🔥 x${m} MULTIPLIER!</span>`;
                $('ans').disabled = true; setTimeout(() => { $('ans').disabled = false; next(); }, 1200); return;
            }
            setTimeout(next, 800);
        } else {
            st.streak = 0; st.hp--; playWrong(); 
            $('game').classList.add('shake');
            setTimeout(() => $('game').classList.remove('shake'), 600);
            $('card').innerHTML = `Incorrect! It was <b>${qW[idx].word}</b>`;
            $('ans').disabled = true; updUI();
            setTimeout(() => { if(st.hp>0){ $('ans').disabled = false; next(); } else end(); }, 1800);
        }
    };

    const next = () => {
        $('ans').value = ""; updUI();
        if(++idx < qW.length) return quiz();
        st.rounds++; st.sc += 10; updUI(); save();
        $('subBtn').style.display = $('ans').style.display = 'none';
        
        // Hide utility buttons during active flow
        $('startBtn').style.display = 'block';
        $('instructBtn').style.display = 'none'; 
        $('resetSaveBtn').style.display = 'none';

        if(st.rounds % 4 === 0) tavern(); else $('card').innerHTML = "Day Complete! +10 ⭐";
    };

    const tavern = () => {
        sfx(880, 'sine', 1); sky(true); document.body.classList.add('tavern-mode');
        $('ui-main').style.display = 'none'; $('ui-tavern').style.display = 'block';
        st.sc += 25; updUI(); save(); $('card').innerHTML = "The Tavern is Open! 🍺";
    };

    const end = () => { clearInterval(timer); localStorage.removeItem('farmSave'); location.reload(); };

    $('startBtn').onclick = () => { playTap(); start(); };
    $('subBtn').onclick = () => { playTap(); submit(); };
    $('ans').onkeypress = (e) => { if(e.key === "Enter") submit(); };
    
    $('instructBtn').onclick = () => { 
        sfx(600, 'sine', 0.1); 
        $('card').innerHTML = `<div style="text-align:left; font-size:16px; line-height:1.5;">
            <b style="color:#a47148; font-size:18px;">📜 Meadow Guide</b><br>
            🧺 <b>Sow the Seeds: Study</b> the items in your patch before the sun sets.<br>
            🌾 <b>Harvest: Read</b> the clue and type the exact word to gather it.<br>
            🔥 <b>Warm the Hearth:</b> Build streaks to earn star multipliers!<br>
            🏡 <b>Rest:</b> Reach Day 4 to visit the Tavern and trade stars for supplies.
        </div>`; 
    };
    
    $('buyH').onclick = () => { if(st.sc>=100){ st.sc-=100; st.hp++; sfx(1174, 'sine', 0.4); updUI(); save(); } };
    $('buyT').onclick = () => { if(st.sc>=50){ st.sc-=50; st.bTime+=3; sfx(1174, 'sine', 0.4); updUI(); save(); } };
    $('nextS').onclick = () => { playArp(); st.sea++; st.wCount+=2; st.tBase+=2; document.body.classList.remove('tavern-mode'); $('ui-main').style.display='block'; $('ui-tavern').style.display='none'; sky(); updUI(); };
    $('restBtn').onclick = () => location.reload();
    $('resetSaveBtn').onclick = () => { playTap(); localStorage.removeItem('farmSave'); location.reload(); };

    const load = () => {
        const d = JSON.parse(localStorage.getItem('farmSave'));
        if(d && d.hp > 0) { 
            Object.assign(st, d); 
            updUI(); sky(); 
            $('resetSaveBtn').style.display = 'block';
            $('card').innerHTML = "Welcome back, Farmer!";
        }
    };

    load(); updUI();
});
